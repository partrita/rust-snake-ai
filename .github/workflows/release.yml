name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release - ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary-name: snake

          - os-name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: snake.exe

          - os-name: macOS-x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            binary-name: snake

          - os-name: macOS-aarch64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            binary-name: snake

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install dependencies (Linux)
        if: matrix.platform.os-name == 'Linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev libxcursor-dev libxinerama-dev libxrandr-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Packaging
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary-name }} artifacts/
          cd artifacts
          if [ "${{ matrix.platform.runs-on }}" = "windows-latest" ]; then
            7z a ../snake-${{ matrix.platform.os-name }}.zip ${{ matrix.platform.binary-name }}
          else
            tar czf ../snake-${{ matrix.platform.os-name }}.tar.gz ${{ matrix.platform.binary-name }}
          fi

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            snake-${{ matrix.platform.os-name }}.zip
            snake-${{ matrix.platform.os-name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
